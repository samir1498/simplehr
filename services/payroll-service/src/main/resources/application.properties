spring.application.name=payroll-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${PAYROLL_DB_URL:jdbc:postgresql://localhost:5435/payroll_db}
spring.datasource.username=${PAYROLL_DB_USERNAME:simplehr}
spring.datasource.password=${PAYROLL_DB_PASSWORD:simplehr}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.missing-topics-fatal=false
app.kafka.group-id=${PAYROLL_KAFKA_GROUP_ID:payroll-service}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
